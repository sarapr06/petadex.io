services:

  # ── Express API ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: petadex-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "3001:3001"
    volumes:
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json
      - /app/node_modules         # keeps container's node_modules isolated
    command: npm run dev

  # ── Gatsby / React frontend ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: petadex-frontend
    restart: unless-stopped
    environment:
      GATSBY_API_URL: http://localhost:3001/api
      NODE_ENV: development
    ports:
      - "8000:8000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/static:/app/static
      - ./frontend/gatsby-config.js:/app/gatsby-config.js
      - ./frontend/gatsby-node.js:/app/gatsby-node.js
      - /app/node_modules
      - /app/.cache                # persist Gatsby build cache
    depends_on:
      - backend
    command: npm run develop -- --host 0.0.0.0 --port 8000
