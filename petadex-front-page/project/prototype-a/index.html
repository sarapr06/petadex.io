<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PETadex — Explore plastic-degrading enzymes</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    :root {
      /* PETadex dark-mode palette, lifted from global.css */
      --background:      oklch(0.14 0 0);
      --foreground:      oklch(0.97 0 0);
      --surface:         oklch(0.14 0 0);
      --surface-raised:  oklch(0.18 0 0);
      --surface-sunken:  oklch(0.10 0 0);
      --card:            oklch(0.20 0 0);
      --muted:           oklch(0.26 0 0);
      --muted-foreground: oklch(0.68 0 0);
      --accent:          oklch(0.64 0.17 22);
      --accent-hover:    oklch(0.70 0.16 22);
      --accent-subtle:   oklch(0.22 0.04 22);
      --border:          oklch(1 0 0 / 0.10);
      --border-strong:   oklch(1 0 0 / 0.18);
      --ring:            oklch(0.64 0.17 22);

      /* family-atlas component colors (sampled from screenshot) */
      --c-blue:    #4F8FE8;
      --c-blue-d:  #2563b8;
      --c-green:   #2ECC71;
      --c-red:     #E74C4C;
      --c-yellow:  #F2C94C;
      --c-purple:  #9B5BE0;
      --c-orange:  #F2994A;
      --c-pink:    #EC4899;
      --c-teal:    #14B8A6;
      --c-skyblue: #6FB7E8;

      --font-sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: ui-monospace, 'SF Mono', Menlo, Monaco, 'Courier New', Courier, monospace;
    }

    html, body { background: var(--background); color: var(--foreground); }
    body {
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    /* Tailwind arbitrary-value bridge so we can write text-[color:var(--foreground)] etc.
       But for clarity we expose a few utility classes here. */
    .bg-bg          { background-color: var(--background); }
    .bg-surface     { background-color: var(--surface); }
    .bg-raised      { background-color: var(--surface-raised); }
    .bg-sunken      { background-color: var(--surface-sunken); }
    .bg-card        { background-color: var(--card); }
    .bg-muted       { background-color: var(--muted); }
    .bg-accent      { background-color: var(--accent); }
    .bg-accent-subtle { background-color: var(--accent-subtle); }
    .text-fg        { color: var(--foreground); }
    .text-muted     { color: var(--muted-foreground); }
    .text-accent    { color: var(--accent); }
    .border-default { border-color: var(--border); }
    .border-strong  { border-color: var(--border-strong); }
    .ring-accent    { --tw-ring-color: var(--ring); }

    .font-mono { font-family: var(--font-mono); }

    /* Subtle dotted grid background, like the napkin sketch margins */
    .dotted-bg {
      background-image: radial-gradient(oklch(1 0 0 / 0.04) 1px, transparent 1px);
      background-size: 22px 22px;
    }

    /* Hero atlas glow */
    .hero-vignette {
      background:
        radial-gradient(ellipse 80% 60% at 30% 50%, oklch(0 0 0 / 0.55) 0%, transparent 70%),
        linear-gradient(to right, oklch(0 0 0 / 0.65) 0%, transparent 50%);
    }

    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-weight: 500; font-size: 0.875rem; line-height: 1;
      padding: 0.75rem 1.25rem; border-radius: 0.625rem;
      border: 1px solid transparent;
      transition: background-color 100ms ease, border-color 100ms ease, color 100ms ease, transform 80ms ease;
      cursor: pointer; user-select: none;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary  { background: var(--accent); color: oklch(0.10 0 0); }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost    { background: transparent; color: var(--foreground); border-color: var(--border-strong); }
    .btn-ghost:hover { background: var(--surface-raised); border-color: var(--muted-foreground); }

    .input {
      width: 100%; background: var(--surface-sunken);
      border: 1px solid var(--border-strong); border-radius: 0.5rem;
      padding: 0.625rem 0.875rem; font-size: 0.875rem;
      color: var(--foreground); font-family: var(--font-mono);
      transition: border-color 100ms ease, box-shadow 100ms ease;
    }
    .input::placeholder { color: var(--muted-foreground); font-family: var(--font-sans); }
    .input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px oklch(from var(--accent) l c h / 0.25); }

    .label {
      font-size: 0.6875rem; font-weight: 600; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--muted-foreground);
      font-family: var(--font-sans);
    }

    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 0.875rem;
      transition: border-color 150ms ease, transform 150ms ease, box-shadow 150ms ease;
    }
    .card-hover:hover { border-color: var(--border-strong); transform: translateY(-2px); }

    /* a thin red active underline like the AtlasMap nav screenshot */
    .nav-active::after {
      content: "";
      position: absolute; left: 0; right: 0; bottom: -6px; height: 2px;
      background: var(--accent); border-radius: 2px;
    }

    .seg {
      display: inline-flex; padding: 2px; gap: 2px;
      background: var(--surface-sunken); border: 1px solid var(--border);
      border-radius: 0.5rem;
    }
    .seg button {
      padding: 0.25rem 0.625rem; font-size: 0.75rem;
      border-radius: 0.375rem; color: var(--muted-foreground);
      transition: background 100ms ease, color 100ms ease;
      font-family: var(--font-sans);
    }
    .seg button[aria-pressed="true"] {
      background: oklch(0.30 0.06 22); color: var(--foreground);
      box-shadow: inset 0 0 0 1px oklch(from var(--accent) l c h / 0.4);
    }
    .seg button:hover:not([aria-pressed="true"]) { color: var(--foreground); }

    /* Citation block monospace styling */
    .cite-block {
      font-family: var(--font-mono); font-size: 0.8125rem; line-height: 1.7;
      color: var(--foreground);
    }
    .cite-block .k { color: var(--muted-foreground); }

    /* Subtle scrollbar */
    *::-webkit-scrollbar { width: 6px; height: 6px; }
    *::-webkit-scrollbar-track { background: var(--surface-sunken); }
    *::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 999px; }
    *::-webkit-scrollbar-thumb:hover { background: var(--muted-foreground); }

    /* Hero atlas legend chip */
    .legend-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 8px; border-radius: 999px;
      background: oklch(0 0 0 / 0.5); border: 1px solid var(--border);
      font-size: 11px; color: var(--muted-foreground);
      font-family: var(--font-mono);
    }
    .legend-dot { width: 8px; height: 8px; border-radius: 999px; flex: 0 0 auto; }

    /* Tool card mini-thumbnail base */
    .mini-thumb {
      position: relative;
      height: 160px;
      background: var(--surface-sunken);
      border-radius: 10px 10px 0 0;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }

    /* Pulse used for "live" indicators */
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
    .pulse-dot { animation: pulse-dot 1.6s ease-in-out infinite; }

    /* fade-in */
    @keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .fadein { animation: fadein 600ms ease both; }

    /* hide focus ring on mouse but keep it on keyboard */
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }
    button:focus { outline: none; }
  </style>
</head>
<body data-screen-label="01 Home — Tools-led">
  <div id="root"></div>

  <script type="text/babel" src="atlas-map.jsx"></script>
  <script type="text/babel" src="thumbnails.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
