openapi: 3.0.3
info:
  title: Petadex Pilot API
  version: 1.0.0
paths:
  /api/fastaa:
    get:
      summary: List all fastaa sequences
      responses:
        '200':
          description: Array of sequences
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Fastaa'
  /api/fastaa/{accession}:
    get:
      summary: Get a single fastaa sequence
      parameters:
        - name: accession
          in: path
          required: true
          schema:
            type: string
            maxLength: 64
      responses:
        '200':
          description: A single sequence
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fastaa'
        '404':
          description: Not found
  /api/atlas/umap:
    get:
      summary: Family atlas UMAP points (family_atlas)
      responses:
        '200':
          description: Points with component, cath_domain, domain_name
          content:
            application/json:
              schema:
                type: object
                properties:
                  points:
                    type: array
                    items:
                      type: object
  /api/atlas/components:
    get:
      summary: Distinct atlas components for CATH domain page selector
      responses:
        '200':
          description: One representative row per component with family counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  components:
                    type: array
                    items:
                      type: object
components:
  schemas:
    Fastaa:
      type: object
      properties:
        accession:
          type: string
        sequence:
          type: string
        created_at:
          type: string
          format: date-time
      required:
        - accession
        - sequence
        - created_at

