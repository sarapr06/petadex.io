name: Backend CI & Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-deploy.yml'
  workflow_dispatch:

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: cd backend && npm ci
      - name: Run tests
        run: cd backend && npm test

  deploy:
    needs: build_and_test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: cd backend && npm ci
      - name: Deploy via Serverless Framework
        working-directory: backend
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DB_HOST: petadex.ccz9y6yshbls.us-east-1.rds.amazonaws.com
          DB_PORT: "5432"
          DB_NAME: petadex
          DB_USER: readonly_user
          DB_PASS: petadex
          # SEARCH_LAMBDA_NAME / RESULTS_BUCKET / RESULTS_PREFIX intentionally omitted —
          # serverless.yml defaults (petadex-diamond-orchestrator / petadex / results)
          # are the source of truth. To flip the search Lambda without a code deploy,
          # add a SEARCH_LAMBDA_NAME repository secret here.
        run: npx serverless@3 deploy --stage dev
